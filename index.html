<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>儿童论语学习 🎋 こどものためのろんご</title>
  <meta name="description" content="儿童论语学习网站，支持日文Ruby注音、中文解释和音频朗读，让孩子轻松学习论语。" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Inline extras */
    .stats-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    .stat-chip {
      background: white;
      border-radius: 20px;
      padding: 8px 18px;
      font-weight: 800;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      color: #555;
    }
    @keyframes confetti {
      to {
        transform: translate(var(--dx), var(--dy));
        opacity: 0;
      }
    }
    .logo-link {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title" id="homeBtn" style="cursor:pointer" title="ホームへ戻る">
    🎋 儿童论语学习 🎋
  </div>
  <div class="header-subtitle">
    <ruby>論語<rt>ろんご</rt></ruby>を<ruby>楽<rt>たの</rt></ruby>しく<ruby>学<rt>まな</rt></ruby>ぼう！ · 和孔子一起学论语
  </div>
  <div class="stars-deco">⭐ 🐼 📚 🐼 ⭐</div>
</header>

<!-- PROGRESS -->
<div class="progress-section">
  <div class="progress-label">📈 学习进度</div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-count" id="progressCount">0 / 0 句</div>
</div>

<!-- MAIN -->
<main>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">📖 目录</div>
    <div id="chapterNav"></div>
  </nav>
  <div class="content" id="content">
    <!-- Rendered by JS -->
  </div>
</main>

<!-- MASCOT -->
<div class="mascot" id="mascot" title="クリックしてね！">🐼</div>
<div class="mascot-bubble" id="mascotBubble"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
