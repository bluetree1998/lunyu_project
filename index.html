<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>儿童《论语》学习 | こどものための論語</title>
  <meta name="description" content="面向儿童的完整《论语》学习网站，包含 20 篇原文、中文儿童导读、日语提示、朗读和学习进度。" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .stats-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-chip {
      background: white;
      border-radius: 20px;
      padding: 8px 18px;
      font-weight: 800;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      color: #555;
    }
    @keyframes confetti {
      to {
        transform: translate(var(--dx), var(--dy));
        opacity: 0;
      }
    }
    .logo-link {
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title" id="homeBtn" style="cursor:pointer" title="回到首页">
    儿童《论语》学习
  </div>
  <div class="header-subtitle">
    <ruby>論語<rt>ろんご</rt></ruby>をたのしく学ぼう · 和孔子一起读经典
  </div>
  <div class="stars-deco">★ 学 · 思 · 仁 · 礼 ★</div>
</header>

<div class="progress-section">
  <div class="progress-label">学习进度</div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-count" id="progressCount">0 / 0 条</div>
</div>

<main>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">目录</div>
    <div id="chapterNav"></div>
  </nav>
  <div class="content" id="content"></div>
</main>

<div class="mascot" id="mascot" title="点我看看学习提示">孔</div>
<div class="mascot-bubble" id="mascotBubble"></div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
